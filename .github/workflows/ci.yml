name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: npm

      - name: Pin npm version
        run: npm i -g npm@11.4.2

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Lockfile drift gate
        run: git diff --exit-code package-lock.json

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          CHROME_BIN_REAL: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          cat > /tmp/chrome-no-sandbox <<'EOF'
          #!/usr/bin/env bash
          exec "${CHROME_BIN_REAL}" --no-sandbox --disable-dev-shm-usage "$@"
          EOF
          chmod +x /tmp/chrome-no-sandbox
          CHROME_BIN=/tmp/chrome-no-sandbox npm run test

      - name: Build libraries
        run: npm run build:libs

      - name: Version consistency
        run: npm run version:check

  changelog-gate:
    name: Changelog gate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Unreleased update for code changes
        run: |
          bash .github/scripts/check_unreleased_update.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"
