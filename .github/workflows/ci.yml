name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.3.0
          cache: npm

      - name: Pin npm version
        run: npm i -g npm@11.4.2

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Lockfile drift gate
        run: git diff --exit-code package-lock.json

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          CHROME_BIN_REAL: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          cat > /tmp/chrome-no-sandbox <<EOF
          #!/usr/bin/env bash
          exec "${CHROME_BIN_REAL}" --headless=new --disable-gpu --no-sandbox --disable-dev-shm-usage "\$@"
          EOF
          chmod +x /tmp/chrome-no-sandbox
          CHROME_BIN=/tmp/chrome-no-sandbox npm run test

      - name: Build libraries
        run: npm run build:libs

      - name: Version consistency
        run: npm run version:check

  changelog-gate:
    name: Changelog gate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate Unreleased update for code changes
        run: |
          bash .github/scripts/check_unreleased_update.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

  draft-release:
    name: Sync Release Draft
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.3.0
          cache: npm

      - name: Pin npm version
        run: npm i -g npm@11.4.2

      - name: Install dependencies
        run: npm ci

      - name: Compose draft notes from package changelogs
        id: notes
        run: |
          set +e
          NOTES="$(npm run -s release:draft-notes)"
          EXIT_CODE="$?"
          set -e

          if [[ "${EXIT_CODE}" -ne 0 ]]; then
            echo "No unreleased package changelog content. Skip draft update."
            {
              echo "skipped=true"
              echo "tag="
              echo "version="
              echo "body="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$(npm run -s release:next-version)"
          TAG="v${VERSION}"
          {
            echo "skipped=false"
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "body<<EOF_BODY"
            printf '%s\n' "${NOTES}"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert GitHub release draft
        if: ${{ steps.notes.outputs.skipped != 'true' }}
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.notes.outputs.tag }}
          RELEASE_VERSION: ${{ steps.notes.outputs.version }}
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;
            const body = process.env.RELEASE_BODY || '';

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = releases.find((r) => r.tag_name === tag && r.draft);
            if (existing) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                tag_name: tag,
                target_commitish: 'main',
                name: tag,
                body,
                draft: true,
                prerelease: false,
              });
              core.info(`Updated draft release for ${tag} (version ${version}).`);
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: 'main',
                name: tag,
                body,
                draft: true,
                prerelease: false,
              });
              core.info(`Created draft release for ${tag} (version ${version}).`);
            }
