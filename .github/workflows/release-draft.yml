name: Release Draft

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-draft-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-release-draft:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    name: Create or update release draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.3.0

      - name: Pin npm version
        run: npm i -g npm@11.4.2

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata from pending changesets
        id: meta
        run: |
          set +e
          NOTES="$(npm run -s release:draft-notes)"
          NOTES_EXIT_CODE="$?"
          NEXT_VERSION="$(npm run -s release:next-version)"
          NEXT_EXIT_CODE="$?"
          set -e

          if [[ "${NOTES_EXIT_CODE}" -ne 0 || "${NEXT_EXIT_CODE}" -ne 0 ]]; then
            echo "No pending package changes for draft."
            {
              echo "skipped=true"
              echo "tag="
              echo "version="
              echo "body="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="v${NEXT_VERSION}"
          {
            echo "skipped=false"
            echo "tag=${TAG}"
            echo "version=${NEXT_VERSION}"
            echo "body<<EOF_BODY"
            printf '%s\n' "${NOTES}"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert GitHub release draft
        if: ${{ steps.meta.outputs.skipped != 'true' }}
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_BODY: ${{ steps.meta.outputs.body }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;
            const body = process.env.RELEASE_BODY || '';

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = releases.find((r) => r.tag_name === tag && r.draft);
            if (existing) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                tag_name: tag,
                target_commitish: 'main',
                name: tag,
                body,
                draft: true,
                prerelease: false,
              });
              core.info(`Updated draft release for ${tag} (version ${version}).`);
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: 'main',
                name: tag,
                body,
                draft: true,
                prerelease: false,
              });
              core.info(`Created draft release for ${tag} (version ${version}).`);
            }
