name: Release Packages (Changesets)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Version or publish changed packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Pin npm version
        run: npm i -g npm@11.4.2

      - name: Install dependencies
        run: npm ci

      - name: Lockfile drift gate
        run: git diff --exit-code package-lock.json

      - name: Build libraries
        run: npm run build:libs

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release:publish
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
