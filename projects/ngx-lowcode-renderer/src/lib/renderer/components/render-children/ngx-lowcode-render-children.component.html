<div
  class="ngx-lowcode-node-list"
  cdkDropList
  [cdkDropListData]="dropListData()"
  [cdkDropListDisabled]="runtime().mode !== 'design'"
  (cdkDropListDropped)="handleDrop($event)"
>
  @for (node of nodes(); track node.id; let index = $index) {
    @if (canDragNode(node)) {
      <div
        class="ngx-lowcode-node-list__item"
        cdkDrag
        [cdkDragData]="node"
        [cdkDragDisabled]="runtime().mode !== 'design' || isDragSuppressed(node.id)"
        (pointerdown)="prepareDrag($event, node.id)"
        (pointerup)="clearPreparedDrag(node.id)"
        (pointercancel)="clearPreparedDrag(node.id)"
        (cdkDragStarted)="handleDragStart(node.id)"
        (cdkDragEnded)="handleDragEnd()"
      >
        <div *cdkDragPreview class="ngx-lowcode-drag-preview">
          {{ dragPreviewLabel(node) }}
        </div>
        <ngx-lowcode-node-renderer
          [node]="node"
          [parentId]="parentId()"
          [slot]="slot()"
          [siblingIndex]="index"
          [parentOrientation]="parentOrientation()"
          [disableSiblingHotspots]="true"
          [runtime]="runtime()"
          [paletteDragging]="paletteDragging()"
          [hoveredDropTarget]="hoveredDropTarget()"
          (dropTargetChange)="dropTargetChange.emit($event)"
        >
        </ngx-lowcode-node-renderer>
      </div>
    } @else {
      <div class="ngx-lowcode-node-list__item">
        <ngx-lowcode-node-renderer
          [node]="node"
          [parentId]="parentId()"
          [slot]="slot()"
          [siblingIndex]="index"
          [parentOrientation]="parentOrientation()"
          [disableSiblingHotspots]="true"
          [runtime]="runtime()"
          [paletteDragging]="paletteDragging()"
          [hoveredDropTarget]="hoveredDropTarget()"
          (dropTargetChange)="dropTargetChange.emit($event)"
        >
        </ngx-lowcode-node-renderer>
      </div>
    }
  }
</div>
