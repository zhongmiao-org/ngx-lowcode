<div cdkDropListGroup>
  @if (schema(); as currentSchema) {
    <ngx-lowcode-render-children
      [nodes]="currentSchema.layoutTree"
      [parentId]="null"
      [slot]="null"
      [runtime]="runtime()"
      [paletteDragging]="paletteDragging()"
      [hoveredDropTarget]="hoveredDropTarget()"
      (dropTargetChange)="dropTargetChange.emit($event)"
    >
    </ngx-lowcode-render-children>
  }
</div>
