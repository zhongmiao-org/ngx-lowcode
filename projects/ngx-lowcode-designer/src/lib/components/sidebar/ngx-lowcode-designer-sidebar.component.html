<button
  type="button"
  class="ngx-lowcode-panel-toggle"
  [attr.aria-label]="collapsed() ? t().expandLeft : t().collapseLeft"
  (click)="toggleCollapse.emit()">
  {{ collapsed() ? '›' : '‹' }}
</button>

@if (!collapsed()) {
  <div class="ngx-lowcode-panel">
    <div class="ngx-lowcode-panel__title">{{ t().materials }}</div>
    <div
      class="ngx-lowcode-materials"
      cdkDropList
      [id]="paletteDropListId()"
      [cdkDropListData]="availableMaterials()"
      [cdkDropListConnectedTo]="[stageDropListId()]"
      [cdkDropListSortingDisabled]="true">
      @for (material of availableMaterials(); track material.type) {
        <button
          [thyButton]="buttonKind"
          class="ngx-lowcode-materials__item"
          cdkDrag
          [cdkDragData]="material.type"
          (cdkDragStarted)="handlePaletteDragStarted($event)"
          (cdkDragEnded)="handlePaletteDragEnded($event)"
          (click)="handleMaterialClick(material.type)">
          {{ material.title }}
        </button>
      }
    </div>
  </div>

  <div class="ngx-lowcode-panel">
    <div class="ngx-lowcode-panel__title">{{ t().outline }}</div>
    <div class="ngx-lowcode-outline">
      @for (node of editorSchema().layoutTree; track node.id) {
        <ng-container [ngTemplateOutlet]="outlineNode" [ngTemplateOutletContext]="{ $implicit: node, depth: 0 }"></ng-container>
      }
    </div>
  </div>
}

<ng-template #outlineNode let-node let-depth="depth">
  <div class="ngx-lowcode-outline__row" [style.padding-left.px]="12 + depth * 16">
    @if (editingOutlineNodeId() === node.id) {
      <input
        thyInput
        class="ngx-lowcode-outline__editor"
        [ngModel]="outlineNameDraft()"
        [placeholder]="t().nodeNamePlaceholder"
        (ngModelChange)="outlineNameDraft.set($event)"
        (blur)="commitOutlineRename(node.id)"
        (keydown.enter)="commitOutlineRename(node.id)"
        (keydown.escape)="cancelOutlineRename()" />
    } @else {
      <button
        type="button"
        class="ngx-lowcode-outline__item"
        [class.is-selected]="selectedNodeId() === node.id"
        (click)="selectNode(node.id)"
        (dblclick)="startOutlineRename(node)">
        {{ nodeDisplayName(node) }}
      </button>
    }
  </div>
  @for (child of node.children ?? []; track child.id) {
    <ng-container [ngTemplateOutlet]="outlineNode" [ngTemplateOutletContext]="{ $implicit: child, depth: depth + 1 }"></ng-container>
  }
</ng-template>
