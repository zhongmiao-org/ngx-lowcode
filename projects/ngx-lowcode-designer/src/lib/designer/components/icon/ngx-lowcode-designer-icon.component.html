<svg
  class="ngx-lowcode-designer-icon"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-linecap="round"
  stroke-linejoin="round"
  stroke-width="2"
  [attr.aria-hidden]="decorative() ? 'true' : null"
  [attr.aria-label]="decorative() ? null : label()"
  [attr.role]="decorative() ? null : 'img'"
>
  @for (node of nodes(); track $index) {
    @switch (node[0]) {
      @case ('path') {
        <path [attr.d]="node[1]['d']"></path>
      }
      @case ('line') {
        <line
          [attr.x1]="node[1]['x1']"
          [attr.y1]="node[1]['y1']"
          [attr.x2]="node[1]['x2']"
          [attr.y2]="node[1]['y2']"
        ></line>
      }
      @case ('polyline') {
        <polyline [attr.points]="node[1]['points']"></polyline>
      }
      @case ('polygon') {
        <polygon [attr.points]="node[1]['points']"></polygon>
      }
      @case ('rect') {
        <rect
          [attr.x]="node[1]['x']"
          [attr.y]="node[1]['y']"
          [attr.width]="node[1]['width']"
          [attr.height]="node[1]['height']"
          [attr.rx]="node[1]['rx']"
          [attr.ry]="node[1]['ry']"
        ></rect>
      }
      @case ('circle') {
        <circle [attr.cx]="node[1]['cx']" [attr.cy]="node[1]['cy']" [attr.r]="node[1]['r']"></circle>
      }
      @case ('ellipse') {
        <ellipse
          [attr.cx]="node[1]['cx']"
          [attr.cy]="node[1]['cy']"
          [attr.rx]="node[1]['rx']"
          [attr.ry]="node[1]['ry']"
        ></ellipse>
      }
    }
  }
</svg>
