<button
  type="button"
  class="ngx-lowcode-panel-toggle"
  [attr.aria-label]="collapsed() ? t().expandLeft : t().collapseLeft"
  (click)="toggleCollapse.emit()">
  {{ collapsed() ? '›' : '‹' }}
</button>

@if (!collapsed()) {
  <div class="ngx-lowcode-panel">
    <div class="ngx-lowcode-panel__title">{{ t().materials }}</div>
    <div
      class="ngx-lowcode-materials"
      cdkDropList
      [id]="paletteDropListId()"
      [cdkDropListData]="availableMaterials()"
      [cdkDropListSortingDisabled]="true">
      @for (group of groupedMaterials(); track group.category) {
        <div class="ngx-lowcode-materials__group">
          <div class="ngx-lowcode-materials__group-title">{{ group.category }}</div>
          <div class="ngx-lowcode-materials__grid">
            @for (material of group.items; track material.type) {
              <div
                class="ngx-lowcode-materials__card"
                cdkDrag
                [cdkDragData]="material.type"
                (cdkDragStarted)="handlePaletteDragStarted($event)"
                (cdkDragEnded)="handlePaletteDragEnded($event)">
                <button
                  type="button"
                  class="ngx-lowcode-materials__handle"
                  cdkDragHandle
                  [attr.aria-label]="t().dragMaterial + ' ' + material.title">
                  <i [class]="materialIcon(material)" aria-hidden="true"></i>
                </button>
                <button
                  type="button"
                  class="ngx-lowcode-materials__content"
                  [attr.title]="materialDescription(material)"
                  (click)="handleMaterialClick(material.type)">
                  <span class="ngx-lowcode-materials__name">{{ material.title }}</span>
                </button>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>

  <div class="ngx-lowcode-panel">
    <div class="ngx-lowcode-panel__title">{{ t().outline }}</div>
    <div class="ngx-lowcode-outline">
      <thy-tree
        thyType="default"
        thySize="sm"
        [thyNodes]="outlineTreeNodes()"
        [thySelectedKeys]="selectedOutlineKeys()"
        [thyExpandedKeys]="expandedOutlineNodeIds()"
        [thyTitleTruncate]="true"
        (thyOnClick)="handleOutlineClick($event)"
        (thyDblClick)="handleOutlineDoubleClick($event)"
        (thyOnExpandChange)="handleOutlineExpandChange($event)">
        <ng-template #treeNodeTemplate let-origin="origin">
          <div class="ngx-lowcode-outline__node">
            <i class="ngx-lowcode-outline__icon" [class]="nodeTypeIcon(origin.origin)" aria-hidden="true"></i>
            @if (editingOutlineNodeId() === origin.origin.id) {
              <input
                thyInput
                class="ngx-lowcode-outline__editor"
                [ngModel]="outlineNameDraft()"
                [placeholder]="t().nodeNamePlaceholder"
                (click)="$event.stopPropagation()"
                (dblclick)="$event.stopPropagation()"
                (ngModelChange)="outlineNameDraft.set($event)"
                (blur)="commitOutlineRename(origin.origin.id)"
                (keydown.enter)="commitOutlineRename(origin.origin.id)"
                (keydown.escape)="cancelOutlineRename()" />
            } @else {
              <span class="ngx-lowcode-outline__label">{{ nodeDisplayName(origin.origin) }}</span>
            }
          </div>
        </ng-template>
      </thy-tree>
    </div>
  </div>
}
