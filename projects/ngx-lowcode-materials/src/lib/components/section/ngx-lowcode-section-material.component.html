<section class="ngx-lowcode-section" [ngStyle]="sectionStyle()">
  <header class="ngx-lowcode-section__header">{{ title() }}</header>
  <div
    class="ngx-lowcode-section__body"
    [ngStyle]="bodyStyle()">
    @if (isDesignMode()) {
      <div
        class="ngx-lowcode-section__design-surface"
        thyFlex
        [thyDirection]="thyDirection()"
        [thyWrap]="thyWrap()"
        [thyJustifyContent]="thyJustifyContent()"
        [thyAlignItems]="thyAlignItems()"
        [thyGap]="+(thyGap() || 0)"
        [ngStyle]="designContainerStyle()"
        cdkDropList
        [cdkDropListData]="dropListData()"
        [cdkDropListDisabled]="false"
        [cdkDropListOrientation]="designDropListOrientation()"
        (cdkDropListEntered)="logDropListEntered($any($event))"
        (cdkDropListExited)="logDropListExited($any($event))"
        (cdkDropListDropped)="handleDrop($any($event))">
        @for (child of node().children ?? []; track child.id; let index = $index) {
          @if (canDragChild(child)) {
            <div
              class="ngx-lowcode-section__item"
              thyFlexItem
              [thyGrow]="resolveFlexItem(child).grow"
              [thyShrink]="resolveFlexItem(child).shrink"
              [thyBasis]="resolveFlexItem(child).basis"
              [ngStyle]="designItemStyle(child)"
              cdkDrag
              [cdkDragData]="child"
              [cdkDragDisabled]="isDragSuppressed(child.id)"
              (pointerdown)="prepareDrag($event, child.id)"
              (pointerup)="clearPreparedDrag(child.id)"
              (pointercancel)="clearPreparedDrag(child.id)"
              (cdkDragStarted)="handleDragStart(child.id)"
              (cdkDragEnded)="handleDragEnd()">
              <div *cdkDragPreview class="ngx-lowcode-section__drag-preview">
                {{ dragPreviewLabel(child) }}
              </div>
              <div class="ngx-lowcode-section__drag-shell">
                <ngx-lowcode-node-renderer
                  [node]="child"
                  [parentId]="node().id"
                  [slot]="null"
                  [siblingIndex]="index"
                  [parentOrientation]="childFlowOrientation()"
                  [disableSiblingHotspots]="true"
                  [runtime]="runtime()">
                </ngx-lowcode-node-renderer>
              </div>
            </div>
          } @else {
            <div
              class="ngx-lowcode-section__item"
              thyFlexItem
              [thyGrow]="resolveFlexItem(child).grow"
              [thyShrink]="resolveFlexItem(child).shrink"
              [thyBasis]="resolveFlexItem(child).basis"
              [ngStyle]="designItemStyle(child)">
              <div class="ngx-lowcode-section__drag-shell">
                <ngx-lowcode-node-renderer
                  [node]="child"
                  [parentId]="node().id"
                  [slot]="null"
                  [siblingIndex]="index"
                  [parentOrientation]="childFlowOrientation()"
                  [disableSiblingHotspots]="true"
                  [runtime]="runtime()">
                </ngx-lowcode-node-renderer>
              </div>
            </div>
          }
        }
      </div>
    } @else {
      <thy-flex
        class="ngx-lowcode-section__flex"
        [thyDirection]="thyDirection()"
        [thyWrap]="thyWrap()"
        [thyJustifyContent]="thyJustifyContent()"
        [thyAlignItems]="thyAlignItems()"
        [thyGap]="+(thyGap() || 0)">
        @for (child of node().children ?? []; track child.id) {
          <thy-flex-item
            class="ngx-lowcode-section__item ngx-lowcode-section__item--flex"
            [thyGrow]="resolveFlexItem(child).grow"
            [thyShrink]="resolveFlexItem(child).shrink"
            [thyBasis]="resolveFlexItem(child).basis"
            [style.order]="resolveFlexItem(child).order"
            [style.align-self]="resolveFlexItem(child).alignSelf">
            <ngx-lowcode-node-renderer
              [node]="child"
              [parentId]="node().id"
              [slot]="null"
              [siblingIndex]="$index"
              [parentOrientation]="childFlowOrientation()"
              [runtime]="runtime()">
            </ngx-lowcode-node-renderer>
          </thy-flex-item>
        }
      </thy-flex>
    }
  </div>
</section>
